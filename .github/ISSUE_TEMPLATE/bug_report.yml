name: Bug Report
description: Report a bug or issue with the plugin-dev plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide details to help diagnose and fix the issue.

        **Tip**: Include the CLI command used, relevant configuration (plugin.json, skill frontmatter), and any error output.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Load plugin with `claude --plugin-dir plugins/plugin-dev`
        2. Run command `/plugin-dev:create-plugin`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: dropdown
    id: bug-type
    attributes:
      label: Bug Type
      description: What kind of issue is this?
      options:
        - Skill not triggering
        - Agent not spawning
        - Command not executing
        - Hook not firing
        - Validation error
        - Incorrect guidance/documentation
        - Rendering/formatting issue
        - Other
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the plugin is affected?
      options:
        - Command (/plugin-dev:*)
        - Skill (documentation/guidance)
        - Agent (autonomous task execution)
        - Hook (event-driven automation)
        - Validation script (utility scripts)
        - Workflow (guided creation process)
        - Marketplace (plugin distribution)
        - Other
    validations:
      required: true

  - type: input
    id: component-name
    attributes:
      label: Specific Component Name
      description: E.g., "/plugin-dev:create-plugin", "hook-development skill", "plugin-validator agent"
      placeholder: "Component name (if applicable)"

  - type: input
    id: cli-command
    attributes:
      label: CLI Command Used
      description: The command that triggered the bug
      placeholder: "claude --plugin-dir plugins/plugin-dev"

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: Include any relevant plugin.json, skill frontmatter, or other config
      placeholder: |
        ```yaml
        # Skill frontmatter, plugin.json excerpt, etc.
        ```
      render: yaml

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details
      placeholder: |
        OS: macOS 15.0
        Claude Code Version: 1.0.0
        Plugin Version: 0.2.0
      render: yaml
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Messages
      description: Any relevant logs or error messages
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, links, or other relevant information
