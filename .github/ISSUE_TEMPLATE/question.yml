name: Question or Support
description: Ask a question about using the plugin-dev plugin
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

        **Consider [GitHub Discussions](../../discussions) instead** - questions often
        get faster community responses there, and the Q&A format is better suited
        for back-and-forth conversation.

        **Resources**: [README](../../blob/main/README.md) | [CLAUDE.md](../../blob/main/CLAUDE.md) | [docs/](../../blob/main/docs/)

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I've checked the README and CLAUDE.md
          required: true
        - label: I've searched existing issues and discussions
          required: true
        - label: I've considered posting in GitHub Discussions instead
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Question Category
      description: What area is your question about?
      options:
        - Installation and setup
        - Using commands
        - Skill development
        - Agent development
        - Hook development
        - MCP integration
        - Marketplace setup
        - Plugin structure
        - Troubleshooting
        - Contributing
        - Other
    validations:
      required: true

  - type: dropdown
    id: component-type
    attributes:
      label: Component Type (if applicable)
      description: Which plugin component is involved?
      options:
        - Not component-specific
        - Skill
        - Agent
        - Command
        - Hook
        - MCP Server
        - Plugin manifest (plugin.json)
    validations:
      required: false

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I...? Why does...? Can I...?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Steps you've already taken to solve this
      placeholder: "I've tried... I looked at..."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Configuration snippets, error messages, or other relevant information
    validations:
      required: false
