name: Documentation Improvement
description: Suggest improvements to documentation (README, CLAUDE.md, or plugin docs)
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!
        Clear documentation helps everyone use the plugin more effectively.

  - type: dropdown
    id: doc-type
    attributes:
      label: Which documentation needs improvement?
      options:
        - README.md
        - CLAUDE.md
        - CHANGELOG.md
        - Skill documentation
        - Agent documentation
        - Command documentation
        - Hook documentation
        - MCP integration docs
        - Marketplace documentation
        - Example files
        - Contributing / Code of Conduct
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Specific Location
      description: File path or section name
      placeholder: "e.g., README.md - Installation section, plugins/plugin-dev/skills/skill-development/SKILL.md"
    validations:
      required: false

  - type: textarea
    id: issue
    attributes:
      label: What's unclear or missing?
      description: Describe what's confusing, incorrect, or missing
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How would you improve it? (Feel free to include proposed wording)
    validations:
      required: false

  - type: checkboxes
    id: issue-type
    attributes:
      label: Type of issue
      options:
        - label: Incorrect information
        - label: Missing information
        - label: Unclear explanation
        - label: Code example needed
        - label: Configuration example needed (plugin.json, frontmatter)
        - label: Broken link
        - label: Missing link (should link somewhere but doesn't)
        - label: Typo or grammar
        - label: Outdated content
        - label: Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, links, or other relevant information
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR with this improvement
