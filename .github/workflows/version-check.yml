name: Version Consistency Check

on:
  pull_request:
    paths:
      - "plugins/plugin-dev/.claude-plugin/plugin.json"
      - ".claude-plugin/marketplace.json"
      - "CLAUDE.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Compare versions
        run: |
          expected=$(jq -r '.version' plugins/plugin-dev/.claude-plugin/plugin.json)
          mp_meta=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          mp_plug=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          cm=$(grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' CLAUDE.md | head -1 | sed 's/^v//')

          {
            echo "## Version Consistency Check"
            echo ""
            echo "| File | Version |"
            echo "| --- | --- |"
            echo "| plugin.json (source of truth) | $expected |"
            echo "| marketplace.json metadata.version | $mp_meta |"
            echo "| marketplace.json plugins[0].version | $mp_plug |"
            echo "| CLAUDE.md | $cm |"
          } >> "$GITHUB_STEP_SUMMARY"

          fail=0
          [ "$mp_meta" != "$expected" ] && { echo "marketplace.json metadata.version ($mp_meta) does not match plugin.json ($expected)"; fail=1; }
          [ "$mp_plug" != "$expected" ] && { echo "marketplace.json plugins[0].version ($mp_plug) does not match plugin.json ($expected)"; fail=1; }
          [ "$cm" != "$expected" ]      && { echo "CLAUDE.md ($cm) does not match plugin.json ($expected)"; fail=1; }

          if [ "$fail" = "1" ]; then
            echo ""
            echo "Update all version files to match plugin.json ($expected)."
            exit 1
          fi

          echo "All versions match: $expected"
