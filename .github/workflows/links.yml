name: Check Links

# Checks all markdown files for broken links using lychee
# Runs on PRs that touch .md files and on manual dispatch
# Key flags:
#   --cache: Cache results to speed up subsequent runs
#   --exclude-link-local: Skip localhost/127.0.0.1 links (not reachable in CI)
# .lycheeignore is auto-detected for URL patterns to exclude
# Creates a GitHub issue on failure for visibility

on:
  pull_request:
    paths:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linkChecker:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Static key: lychee handles staleness via --max-cache-age 1d
      # Split restore/save pattern ensures cache is saved even on failure
      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: .lycheecache
          key: cache-lychee-v1

      - name: Link Checker
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --verbose
            --no-progress
            --exclude-link-local
            '**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save lychee cache
        uses: actions/cache/save@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        if: always()
        with:
          path: .lycheecache
          key: cache-lychee-v1
